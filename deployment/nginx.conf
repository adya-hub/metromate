server {
    listen 80;
    server_name api.metromate.com; # Replace with your domain

    # Redirect HTTP to HTTPS (uncomment when SSL is ready)
    # return 301 https://$host$request_uri;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    # Gzip Compression (handled partially by Express, but good for Nginx too)
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1000;

    location / {
        proxy_pass http://localhost:3001; # Point to PM2 backend port
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for graph heavy requests
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }

    # Optional caching for static API responses
    # location /api/metro/stops {
    #     proxy_cache my_cache;
    #     proxy_cache_valid 200 1h;
    #     proxy_pass http://localhost:3001;
    # }
}
